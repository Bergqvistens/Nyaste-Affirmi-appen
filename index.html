function getTimeMode() {
  const h = new Date().getHours();
  if (h >= 5 && h < 10) return "morning";
  if (h >= 10 && h < 17) return "day";
  if (h >= 17 && h < 21) return "evening";
  return "night";
}

// Dygnsläge för ett godtyckligt datum (t.ex. en reflektion) — samma gränser som getTimeMode.
function timeModeForDate(dateStr){
  const h = new Date(dateStr).getHours();
  if (h >= 5 && h < 10) return "morning";
  if (h >= 10 && h < 17) return "day";
  if (h >= 17 && h < 21) return "evening";

}

// Variations-prefix som ger upphov till 365 unika dagliga kombinationer
const AGE_AFF_PREFIX = [
  "", "Idag påminner jag mig: ", "Jag väljer att tro att ", "Med mjukhet mot mig själv vet jag att ",
  "Steg för steg upptäcker jag att ", "Jag andas och låter mig känna att ", "I detta ögonblick vet jag att ",
  "Med tiden förstår jag allt mer att ", "Jag bär med mig sanningen att ", "Jag öppnar mig för insikten att ",
];

function getAgeAffirmation(ageGroup, dayIndex){
  const core = AGE_AFF_CORE[ageGroup] || AGE_AFF_CORE.middle;
  const totalCombos = core.length * AGE_AFF_PREFIX.length; // 10 × 10 = 100, upprepas ~3.65 ggr per år
  const idx = dayIndex % totalCombos;
  const coreIdx = idx % core.length;
  const prefixIdx = Math.floor(idx / core.length) % AGE_AFF_PREFIX.length;
  const prefix = AGE_AFF_PREFIX[prefixIdx];
  const phrase = core[coreIdx];
  // Om prefix finns, gör första bokstaven i frasen liten (utom "Jag")
  if(!prefix) return phrase;
  const lower = phrase.charAt(0).toLowerCase() + phrase.slice(1);
  return prefix + lower;
}

  if(!joinedAt) return false;
  const joined=new Date(joinedAt);

// Åldersgrupp
function getAgeFromBirthYear(birthYear){
  if(!birthYear) return null;
  return new Date().getFullYear() - parseInt(birthYear);
}
function getAgeGroup(age) {
  if (!age) return "middle";
  const n = parseInt(age);
  if (n >= 13 && n <= 14) return "teen13";
  if (n >= 15 && n <= 17) return "teen17";
  if (n >= 18 && n <= 25) return "young";
  if (n >= 26 && n <= 40) return "middle";
  if (n >= 41 && n <= 60) return "midlife";
  if (n >= 61 && n <= 75) return "senior61";
  if (n >= 76 && n <= 100) return "senior76";
  return "middle";
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return INIT;
    const saved=JSON.parse(raw);
    const today=new Date().toISOString().slice(0,10);
    const isNewDay=saved.lastSessionDate!==today;
    const computedAge = saved.birthYear ? getAgeFromBirthYear(saved.birthYear) : saved.age;
    const ag=getAgeGroup(computedAge);
    const cfg=AGE_CONFIG[ag]||AGE_CONFIG.middle;
    const stepCount=cfg.steps.length;
    const prevDone=Array.isArray(saved.dailyPathDone)?saved.dailyPathDone:[];
    const prevPct=stepCount>0?Math.round((prevDone.length/stepCount)*100):0;
    return{
      ...INIT,...saved,
      age:computedAge,
      ageGroup:ag,
      dailyPathDone:isNewDay?[]:(Array.isArray(saved.dailyPathDone)?saved.dailyPathDone:[]),
      dailyMode:isNewDay?null:(saved.dailyMode||null),
      lastSessionPct:isNewDay?saved.lastSessionPct||0:(saved.lastSessionPct||0),
      lastSessionDate:today,
      lastVisitAt:new Date().toISOString(),
      yesterdayPct:isNewDay?prevPct:(saved.yesterdayPct||0),
      yesterdayDone:isNewDay?(prevPct===100):(saved.yesterdayDone||false),
      groundCountToday: saved.groundCountDate===today ? (saved.groundCountToday||0) : 0,
      groundCountDate: today,
      extraBreathCredits: isNewDay?0:(saved.extraBreathCredits??(saved.extraBreathDate===today?1:0)),
      extraReflectionCredits: isNewDay?0:(saved.extraReflectionCredits??(saved.extraReflectionDate===today?1:0)),
      extraGroundCredits: isNewDay?0:(saved.extraGroundCredits||0),
      extraGroundPurchasedToday: isNewDay?0:(saved.extraGroundPurchasedToday||0),
      soundUnlocks: (()=>{
        if(saved.soundUnlocks&&typeof saved.soundUnlocks==="object"&&!Array.isArray(saved.soundUnlocks)) return saved.soundUnlocks;
        if(Array.isArray(saved.unlockedSounds)){
          const migrated={};
          const expiry=new Date(Date.now()+7*86400000).toISOString();
          saved.unlockedSounds.forEach(id=>{migrated[id]=expiry;});
          return migrated;
        }
        return {};
      })(),
      journalEntries: (Array.isArray(saved.journalEntries)?saved.journalEntries:[]).map((e,i)=>e.id?e:{...e,id:`legacy_${i}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`}),
      showPremium:false,showGdpr:false,showKontakt:false,showNotis:false,confetti:false,notisToast:null,

  }catch{return INIT;}
}

function reducer(s,a){
  let next;
  switch(a.type){
    case "SET_NAME": {
      const computedAge=getAgeFromBirthYear(a.birthYear);
      next={...s,name:a.name,birthYear:a.birthYear||null,age:computedAge,ageGroup:getAgeGroup(computedAge),showWelcomeTour:true,joinedAt:s.joinedAt||new Date().toISOString()};
      break;
    }
    case "HIDE_WELCOME_TOUR": next={...s,showWelcomeTour:false}; break;
    case "SET_SCREEN": next={...s,screen:a.screen}; break;
    case "SET_THEME": next={...s,activeTheme:a.id}; break;
    case "ADD_LJUS": next={...s,ljus:s.ljus+a.amt}; break;
    case "BUY_ITEM": {
      if(s.ljus<a.cost){next=s;break;}
      const today=new Date().toISOString().slice(0,10);
      if(a.item==="extraBreath") next={...s,ljus:s.ljus-a.cost,extraBreathCredits:(s.extraBreathCredits||0)+1};
      else if(a.item==="extraReflection") next={...s,ljus:s.ljus-a.cost,extraReflectionCredits:(s.extraReflectionCredits||0)+1};
      else if(a.item==="extraGround") {
        if((s.extraGroundPurchasedToday||0)>=GROUND_MAX_EXTRA){next=s;break;}
        next={...s,ljus:s.ljus-a.cost,extraGroundCredits:(s.extraGroundCredits||0)+1,extraGroundPurchasedToday:(s.extraGroundPurchasedToday||0)+1};
      }
      else if(a.item==="sound") {
        const expiry=new Date(Date.now()+7*86400000).toISOString();
        next={...s,ljus:s.ljus-a.cost,soundUnlocks:{...(s.soundUnlocks||{}),[a.soundId]:expiry}};
      }
      else if(a.item==="soundBundle") {
        const expiry=new Date(Date.now()+7*86400000).toISOString();
        const allUnlocks={...(s.soundUnlocks||{})};
        SOUNDS.forEach(snd=>{if(!snd.free) allUnlocks[snd.id]=expiry;});
        next={...s,ljus:s.ljus-a.cost,soundUnlocks:allUnlocks};
      }
      else next=s;
      break;
    }
    case "ADD_BADGE": next=s.badges.includes(a.id)?s:{...s,badges:[...s.badges,a.id]}; break;
    case "USE_EXTRA_BREATH_CREDIT": next=(s.extraBreathCredits||0)>0?{...s,extraBreathCredits:s.extraBreathCredits-1}:s; break;
    case "USE_EXTRA_REFLECTION_CREDIT": next=(s.extraReflectionCredits||0)>0?{...s,extraReflectionCredits:s.extraReflectionCredits-1}:s; break;
    case "USE_EXTRA_GROUND_CREDIT": next=(s.extraGroundCredits||0)>0?{...s,extraGroundCredits:s.extraGroundCredits-1}:s; break;
    case "ADD_WEEKLY_CHECKIN": {
      const existing=(s.weeklyCheckins||[]).filter(c=>c.weekStart!==a.weekStart);
      next={...s,weeklyCheckins:[...existing,{weekStart:a.weekStart,rating:a.rating,note:a.note||"",date:new Date().toISOString()}]};
      break;
    }
    case "COMPLETE_STEP": {
      const done=s.dailyPathDone.includes(a.id)?s.dailyPathDone:[...s.dailyPathDone,a.id];
      next={...s,dailyPathDone:done};
      break;
    }
    case "SET_DAILY_MODE": next={...s,dailyMode:a.mode}; break;
    case "INC_GROUND_COUNT": {
      const today=new Date().toISOString().slice(0,10);
      const sameDay = s.groundCountDate===today;
      next={...s,groundCountToday:(sameDay?s.groundCountToday:0)+1,groundCountDate:today};
      break;
    }
    case "TODAY_DONE": {
      const today=new Date().toISOString().slice(0,10);
      let flode=s.flode;
      let softStreak=false;
      if(!s.lastDoneDate) flode=1;
      else{
        const diff=Math.floor((new Date(today)-new Date(s.lastDoneDate))/86400000);
        if(diff===1) flode=s.flode+1;
        else if(diff===2){flode=s.flode+1;softStreak=false;} // missade 1 dag — mjuk streak räddad
        else flode=1;
      }
      next={...s,todayDone:true,flode,softStreak,lastDoneDate:today};
      break;
    }
    case "ADD_JOURNAL": next={...s,journalEntries:[...s.journalEntries,{id:Date.now()+"_"+Math.random().toString(36).slice(2,8),text:a.text,date:new Date().toISOString(),fromResa:a.fromResa||false,fav:false}]}; break;
    case "SHARE_AFFIRMATION": {
      // Belöning: +2 💎 för de första 5 delningarna per vecka (mån–sön).
      // Premium har ett tyst, osynligt tak på 40 delningar/vecka — ingen UI-indikation,
      // delningen registreras bara inte (skydd mot spam av delningsflödet).
      const nowSh=new Date();
      const dayIdx=(nowSh.getDay()+6)%7;
      const wkStart=new Date(nowSh);wkStart.setHours(0,0,0,0);wkStart.setDate(wkStart.getDate()-dayIdx);
      const sharesThisWeek=(s.shareDates||[]).filter(dt=>new Date(dt)>=wkStart).length;
      if(s.isPremium&&sharesThisWeek>=40){next=s;break;}
      const shareReward=sharesThisWeek<5?2:0;
      next={...s,shareDates:[...(s.shareDates||[]),nowSh.toISOString()],ljus:s.ljus+shareReward};
      break;
    }
    case "TOGGLE_JOURNAL_FAV": next=a.id?{...s,journalEntries:s.journalEntries.map(e=>e.id===a.id?{...e,fav:!e.fav}:e)}:s; break;
    case "TOGGLE_FAVORITE": {
      const favs=s.favoriteAffirmations||[];
      const exists=favs.includes(a.text);
      next={...s,favoriteAffirmations:exists?favs.filter(t=>t!==a.text):[...favs,a.text]};
      break;
    }
    case "SHOW_PREMIUM": {
      const isMinor = s.age && parseInt(s.age) < 18;
      next = isMinor ? {...s, showGuardianGate:true, showNotis:false} : {...s, showPremium:true, showNotis:false};
      break;
    }
    case "HIDE_PREMIUM": next={...s,showPremium:false}; break;
    case "SHOW_GUARDIAN_GATE": next={...s,showGuardianGate:true}; break;
    case "HIDE_GUARDIAN_GATE": next={...s,showGuardianGate:false}; break;
    case "UPGRADE": {
      const isMinor = s.age && parseInt(s.age) < 18;
      if (isMinor) { next = s; break; } // hårdspärr: minderåriga kan aldrig sätta isPremium
      next={...s,isPremium:true,showPremium:false};
      break;
    }
    case "SHOW_GDPR": next={...s,showGdpr:true}; break;
    case "HIDE_GDPR": next={...s,showGdpr:false}; break;
    case "SHOW_KONTAKT": next={...s,showKontakt:true}; break;
    case "HIDE_KONTAKT": next={...s,showKontakt:false}; break;
    case "SHOW_NOTIS": next={...s,showNotis:true}; break;
    case "HIDE_NOTIS": next={...s,showNotis:false}; break;
    case "SET_NOTIS": {
      const fmtT=(h,mn)=>`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;
      const xTimes=(s.isPremium?(a.extraTimes||[]).slice(0,2):[]);
      const allT=[fmtT(a.hour,a.minute),...xTimes.map(t=>fmtT(t.hour,t.minute))].sort();
      const plural=allT.length>1;
      const timeList=plural?allT.slice(0,-1).join(", ")+" och "+allT[allT.length-1]:allT[0];
      const toast=a.active?`🔔 Påminnelse${plural?"r":""} sparad${plural?"e":""} — ${timeList}`:null;
      next={...s,notisActive:a.active,notisHour:a.hour,notisMinute:a.minute,notisDays:a.days,notisPosition:a.position,notisContent:(s.isPremium?(a.content||"affirmation"):"affirmation"),notisExtraTimes:xTimes,notisToast:toast,showNotis:false}; break;
    }
    case "CLEAR_NOTIS_TOAST": next={...s,notisToast:null}; break;
    case "CONFETTI_ON": next={...s,confetti:true}; break;
    case "CONFETTI_OFF": next={...s,confetti:false}; break;
    case "ACCEPT_COOKIES": next={...s,cookiesAccepted:true}; break;
    case "RESET": localStorage.removeItem(STORAGE_KEY); return INIT;
    default: return s;
  }
  saveState(next);
  return next;
}

function DiamondCircle({ljus,lv,nxt,m}){
  // Beräkna progress inom nuvarande nivå
  const span = nxt ? (nxt.min - lv.min) : 200;
  const into = Math.max(0, ljus - lv.min);
  const totalPct = Math.min(into / span, 1);

  // Dela upp i "varv" om 6 diamanter vardera
  const totalSlots = 6;
  const fullCircles = Math.floor(totalPct * 1 * 1); // vi använder en enklare modell nedan
  // Hur många hela "cirklar" (varv av 6) har klarats, och hur fyllda är vi i den aktuella?
  const slotsEarned = totalPct >= 1 ? totalSlots : Math.floor(totalPct * totalSlots);
  const completedCircles = totalPct >= 1 ? 1 : 0; // en cirkel slutförs när nivån är klar
  const currentSlots = totalPct >= 1 ? totalSlots : slotsEarned;

  const positions = Array.from({length: totalSlots}, (_, i) => {
    const angle = (i * 360 / totalSlots - 90) * (Math.PI / 180);
    const r = 38;
    return { x: 50 + Math.cos(angle) * r, y: 50 + Math.sin(angle) * r };
  });

  const isFull = currentSlots >= totalSlots;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px"}}>
      <div style={{position:"relative",width:"100px",height:"100px",color:m==="morning"?"#4F4258":"rgba(240,237,230,0.85)"}}>
        <svg width="100" height="100" viewBox="0 0 100 100" style={{position:"absolute",inset:0}}>
          {/* Subtle connecting ring */}
          <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(200,200,200,0.1)" strokeWidth="1" strokeDasharray="2,4"/>
          {positions.map((p, i) => {
            const filled = i < currentSlots;
            return (
              <text
                key={i}
                x={p.x}
                y={p.y}
                fontSize={filled ? "16" : "13"}
                textAnchor="middle"
                dominantBaseline="middle"
                fill="currentColor"
                opacity={filled ? 1 : 0.5}
                style={{transition:"all 0.4s ease",filter:filled&&isFull?"drop-shadow(0 0 4px rgba(122,158,230,0.8))":"none"}}
              >
                {filled ? "💎" : "◇"}
              </text>
            );
          })}
        </svg>
        {/* Center: nivå-emoji eller stor diamant om full */}
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isFull?"30px":"24px",transition:"all 0.4s ease",filter:isFull?"drop-shadow(0 0 6px rgba(122,158,230,0.6))":"none"}}>
          {isFull ? "🔷" : lv.emoji}
        </div>
      </div>
      <div style={{fontSize:"11px",color:m==="morning"?"#5A6A5E":"#A89F8C"}}>
        {isFull ? "Nivå klar! ✨" : `${currentSlots}/${totalSlots} diamanter`}
      </div>
    </div>
  );
}

let _iconUidCounter = 0;
function useIconUid(prefix){
  const ref = useRef(null);
  if(ref.current===null){ref.current=`${prefix}${_iconUidCounter++}`;}
  return ref.current;
}

function DiamondIcon({size=20}){
  const gid=useIconUid("dia");
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" style={{flexShrink:0}}>

          <stop offset="0%" stopColor="#6EC9F0"/>
          <stop offset="100%" stopColor="#2E86D1"/>
        </linearGradient>
      </defs>
      <path d="M12 2.2 L19.8 7 L19.8 17 L12 21.8 L4.2 17 L4.2 7 Z" fill={`url(#${gid})`} stroke="rgba(255,255,255,0.4)" strokeWidth="0.6" strokeLinejoin="round"/>
    </svg>
  );
}

function mixHex(a,b,t){
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const c=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function LevelIcon({size=30, index=0, outOf=9, dimmed=false}){
  const t=outOf>1?index/(outOf-1):0;
  const fillColor=mixHex("#DFF7F5","#0F4F4F",t);
  const textColor=t>0.55?"#F2EFE8":"#0F2A28";
  return(
    <svg width={size} height={size} viewBox="0 0 32 32" style={{flexShrink:0,opacity:dimmed?0.35:1}}>
      <circle cx="16" cy="16" r="14" fill={fillColor} stroke="rgba(255,255,255,0.25)" strokeWidth="1"/>
      <text x="16" y="21" textAnchor="middle" fontSize="13" fontWeight="800" fill={textColor}>{index+1}</text>
    </svg>
  );
}

function NotisModal({s,d,m}){
  const isDark=m==="evening"||m==="night";

  const tc=isDark?"#F0EDE6":isDay?"#F0EDE6":"#2A3A2E";
  const sc=isDark?"#A89F8C":isDay?"#A89F8C":"#2A3A2E";
  const cardBg=isDark?"rgba(240,237,230,0.07)":isDay?"rgba(240,237,230,0.07)":"rgba(0,0,0,0.05)";
  const borderC=isDark?"rgba(240,237,230,0.12)":isDay?"rgba(240,237,230,0.12)":"rgba(0,0,0,0.12)";
  const [active,setActive]=useState(s.notisActive);
  const [hour,setHour]=useState(s.notisHour);
  const [minute,setMinute]=useState(s.notisMinute);
  const [days,setDays]=useState(s.notisDays);
  const [position,setPosition]=useState(s.notisPosition||"top");
  const [content,setContent]=useState(s.notisContent||"affirmation");
  const [extraTimes,setExtraTimes]=useState(s.notisExtraTimes||[]);
  const DAYS=[{key:"Mon",label:"Mån"},{key:"Tue",label:"Tis"},{key:"Wed",label:"Ons"},{key:"Thu",label:"Tor"},{key:"Fri",label:"Fre"},{key:"Sat",label:"Lör"},{key:"Sun",label:"Sön"}];
  const POSITIONS=[{id:"top",label:"Längst upp",emoji:"⬆️"},{id:"center",label:"Mitten",emoji:"↕️"},{id:"bottom",label:"Nederdel",emoji:"⬇️"}];

    {id:"affirmation",label:"Affirmation",emoji:"🌸",premium:false,msg:"🌸 Dagens affirmation väntar på dig"},
    {id:"breath",label:"Andning",emoji:"🌬️",premium:true,msg:"🌬️ Dags att andas — en lugn stund väntar"},
    {id:"ground",label:"Här & Nu",emoji:"🌿",premium:true,msg:"🌿 Här & Nu — landa i nuet en liten stund"},
  ];
  const toggleDay=(key)=>setDays(prev=>prev.includes(key)?prev.filter(x=>x!==key):[...prev,key]);
  const stepExtra=(i,delta)=>setExtraTimes(ts=>ts.map((x,j)=>{
    if(j!==i)return x;
    const tot=(x.hour*60+x.minute+delta+1440)%1440;
    return{hour:Math.floor(tot/60),minute:tot%60};
  }));
  const save=()=>d({type:"SET_NOTIS",active,hour,minute,days,position,content,extraTimes});
  const timeStr=`${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")}`;

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:1000,display:"flex",alignItems:"flex-end",padding:"12px"}}>
      <div style={{background:bg,borderRadius:"20px",padding:"22px",width:"100%",maxHeight:"80vh",overflowY:"auto",color:tc}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <div>
            <div style={{fontSize:"18px",fontWeight:"800"}}>🔔 Påminnelser</div>
            <div style={{fontSize:"12px",color:sc,marginTop:"2px"}}>Ställ in dina dagliga påminnelser</div>
          </div>
          <div onClick={()=>setActive(!active)} style={{width:"50px",height:"28px",borderRadius:"14px",background:active?"#5E4B7A":borderC,cursor:"pointer",position:"relative",transition:"background 0.3s"}}>
            <div style={{position:"absolute",top:"3px",left:active?"25px":"3px",width:"22px",height:"22px",borderRadius:"50%",background:"#fff",transition:"left 0.3s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
          </div>
        </div>
        {active&&(
          <>
            <div style={{background:cardBg,borderRadius:"14px",padding:"16px",marginBottom:"14px",border:`1px solid ${borderC}`}}>
              <div style={{fontSize:"12px",color:sc,marginBottom:"12px",fontWeight:"600",letterSpacing:"0.5px"}}>VÄLJ TID</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                  <button onClick={()=>setHour(h=>(h+1)%24)} style={{background:cardBg,border:`1px solid ${borderC}`,borderRadius:"8px",padding:"6px 12px",color:tc,cursor:"pointer",fontSize:"16px"}}>▲</button>
                  <div style={{fontSize:"36px",fontWeight:"800",color:tc,minWidth:"60px",textAlign:"center"}}>{String(hour).padStart(2,"0")}</div>
                  <button onClick={()=>setHour(h=>(h-1+24)%24)} style={{background:cardBg,border:`1px solid ${borderC}`,borderRadius:"8px",padding:"6px 12px",color:tc,cursor:"pointer",fontSize:"16px"}}>▼</button>
                </div>
                <div style={{fontSize:"36px",fontWeight:"800",color:sc}}>:</div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                  <button onClick={()=>setMinute(mn=>(mn+5)%60)} style={{background:cardBg,border:`1px solid ${borderC}`,borderRadius:"8px",padding:"6px 12px",color:tc,cursor:"pointer",fontSize:"16px"}}>▲</button>
                  <div style={{fontSize:"36px",fontWeight:"800",color:tc,minWidth:"60px",textAlign:"center"}}>{String(minute).padStart(2,"0")}</div>
                  <button onClick={()=>setMinute(mn=>(mn-5+60)%60)} style={{background:cardBg,border:`1px solid ${borderC}`,borderRadius:"8px",padding:"6px 12px",color:tc,cursor:"pointer",fontSize:"16px"}}>▼</button>
                </div>
              </div>

            <div style={{background:cardBg,borderRadius:"14px",padding:"16px",marginBottom:"14px",border:`1px solid ${borderC}`}}>

              <div style={{display:"flex",gap:"6px",justifyContent:"space-between"}}>
                {DAYS.map(day=>{const on=days.includes(day.key);return(<button key={day.key} onClick={()=>toggleDay(day.key)} style={{flex:1,padding:"10px 2px",borderRadius:"10px",border:`2px solid ${on?"#A8883A":borderC}`,background:on?"rgba(94,75,122,0.55)":cardBg,color:on?"#fff":sc,fontSize:"11px",fontWeight:on?"700":"400",cursor:"pointer"}}>{day.label}</button>);})}
              </div>
            </div>
            <div style={{background:cardBg,borderRadius:"14px",padding:"16px",marginBottom:"14px",border:`1px solid ${borderC}`}}>
              <div style={{fontSize:"12px",color:sc,marginBottom:"12px",fontWeight:"600",letterSpacing:"0.5px"}}>VAD SKA PÅMINNELSEN INNEHÅLLA?</div>

                {CONTENTS.map(c=>{

                    <button key={c.id} onClick={()=>{if(locked){d({type:"SHOW_PREMIUM"});return;}setContent(c.id);}} style={{flex:1,padding:"12px 4px",borderRadius:"12px",border:`2px solid ${on?"#A8883A":borderC}`,background:on?"rgba(94,75,122,0.55)":cardBg,color:on?"#fff":sc,fontSize:"11px",fontWeight:on?"700":"400",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",opacity:locked?0.75:1,position:"relative"}}>

                      <span style={{fontSize:"16px"}}>{c.emoji}</span>{c.label}

              {!s.isPremium&&(

                {POSITIONS.map(pos=>{const isActive=position===pos.id;return(<button key={pos.id} onClick={()=>setPosition(pos.id)} style={{flex:1,padding:"12px 4px",borderRadius:"12px",border:`2px solid ${isActive?"#A8883A":borderC}`,background:isActive?"rgba(94,75,122,0.55)":cardBg,color:isActive?"#fff":sc,fontSize:"11px",fontWeight:isActive?"700":"400",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}><span style={{fontSize:"16px"}}>{pos.emoji}</span>{pos.label}</button>);})}

function WeeklyCheckinModal({s,d,M,weekStart,onClose}){
  const [rating,setRating]=useState(3);
  const [note,setNote]=useState("");
  const [saved,setSaved]=useState(false);
  const trackRef=useRef(null);
  const draggingRef=useRef(false);
  const labels=["Inte alls","Lite","Måttligt","Bra","Väldigt mycket"];
  const emojis=["😔","😕","🙂","😊","🤩"];

  const valueFromX=(clientX)=>{
    const el=trackRef.current;
    if(!el) return rating;
    const rect=el.getBoundingClientRect();
    const ratio=Math.min(1,Math.max(0,(clientX-rect.left)/rect.width));
    return Math.round(ratio*4)+1;
  };
  const vib=()=>{if(navigator.vibrate) navigator.vibrate(20);};
  const handleMove=(clientX)=>{
    const v=valueFromX(clientX);
    setRating(prev=>{if(v!==prev) vib(); return v;});
  };
  const onPointerDown=(e)=>{
    draggingRef.current=true;
    const x=e.touches?e.touches[0].clientX:e.clientX;
    handleMove(x);
  };
  useEffect(()=>{
    const onMove=(e)=>{if(!draggingRef.current)return;const x=e.touches?e.touches[0].clientX:e.clientX;handleMove(x);};
    const onUp=()=>{draggingRef.current=false;};
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:true});
    window.addEventListener("touchend",onUp);
    return ()=>{
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
  });

  const save=()=>{
    d({type:"ADD_WEEKLY_CHECKIN",weekStart,rating,note:note.trim()});
    d({type:"ADD_LJUS",amt:10});
    setSaved(true);
    setTimeout(onClose,5500);
  };

  return(
    <div onClick={saved?undefined:onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:M.bg,borderRadius:"22px",padding:"26px 22px",maxWidth:"380px",width:"100%",border:`1px solid ${M.accent}30`,position:"relative"}}>
        {saved?(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <button onClick={onClose} aria-label="Stäng" style={{position:"absolute",top:"14px",right:"16px",background:"none",border:"none",color:M.textSub,cursor:"pointer",fontSize:"18px",lineHeight:1}}>✕</button>
            <div style={{fontSize:"44px",marginBottom:"12px"}}>🌿</div>
            <div style={{fontSize:"16px",fontWeight:"800",color:M.text,marginBottom:"6px"}}>Vad bra du är som tar hand om dig själv! 🌱</div>
            <div style={{fontSize:"11px",color:M.textSub,lineHeight:1.6,marginBottom:"8px"}}>Din skattning ser bara du — den delas inte med någon annan.</div>
            <div style={{fontSize:"12px",color:M.textSub}}>+10 💎 tjänade</div>
            <button onClick={onClose} style={{marginTop:"14px",padding:"9px 20px",background:M.button,color:M.btnText,border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>Stäng</button>
          </div>
        ):(
          <>
            <div style={{textAlign:"center",marginBottom:"6px"}}>
              <div style={{fontSize:"36px",marginBottom:"8px"}}>{emojis[rating-1]}</div>
              <div style={{fontSize:"17px",fontWeight:"800",color:M.text,marginBottom:"4px"}}>Hur har affirmationerna känts denna vecka?</div>
              <div style={{fontSize:"12px",color:M.textSub,lineHeight:1.6}}>Dra för att skatta din upplevda utveckling 🌱</div>
              <div style={{fontSize:"10px",color:M.textSub,lineHeight:1.6,marginTop:"6px",opacity:0.75}}>🔒 Svaren ser bara du — delas inte med någon</div>
            </div>

            {/* DRAGBAR SKALA 1–5 */}
            <div style={{margin:"26px 0 6px"}}>
              <div
                ref={trackRef}
                onMouseDown={onPointerDown}
                onTouchStart={onPointerDown}
                style={{position:"relative",height:"40px",display:"flex",alignItems:"center",cursor:"pointer",touchAction:"none"}}
              >
                <div style={{position:"absolute",left:0,right:0,height:"6px",borderRadius:"4px",background:`${M.accent}20`}}/>
                <div style={{position:"absolute",left:0,width:`${((rating-1)/4)*100}%`,height:"6px",borderRadius:"4px",background:`linear-gradient(90deg,#C8B6E2,${M.gold})`,transition:draggingRef.current?"none":"width 0.15s"}}/>
                {[0,1,2,3,4].map(i=>(
                  <div key={i} style={{position:"absolute",left:`${(i/4)*100}%`,transform:"translateX(-50%)",width:"8px",height:"8px",borderRadius:"50%",background:i<=rating-1?M.gold:`${M.accent}40`}}/>
                ))}
                <div style={{position:"absolute",left:`${((rating-1)/4)*100}%`,transform:"translateX(-50%)",width:"30px",height:"30px",borderRadius:"50%",background:M.gold,border:`3px solid ${M.bg}`,boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:"8px"}}>
                {[1,2,3,4,5].map(n=>(
                  <span key={n} style={{fontSize:"11px",color:n===rating?M.gold:M.textSub,fontWeight:n===rating?"700":"400",width:"20%",textAlign:n===1?"left":n===5?"right":"center"}}>{n}</span>
                ))}
              </div>
              <div style={{textAlign:"center",fontSize:"13px",color:M.gold,fontWeight:"700",marginTop:"10px"}}>{labels[rating-1]}</div>
            </div>

            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Vill du skriva några rader om hur du upplever effekten? (frivilligt)" rows={3} style={{width:"100%",padding:"12px 14px",background:M.cardMid,border:`1px solid ${M.accent}20`,borderRadius:"12px",color:M.text,fontSize:"13px",lineHeight:1.5,resize:"none",outline:"none",boxSizing:"border-box",marginTop:"14px",marginBottom:"14px"}}/>

            <button onClick={save} style={{width:"100%",padding:"14px",background:M.button,color:M.btnText,border:"none",borderRadius:"14px",fontSize:"14px",fontWeight:"700",cursor:"pointer",marginBottom:"8px"}}>Spara — +10 💎</button>
            <button onClick={onClose} style={{width:"100%",padding:"10px",background:"transparent",border:"none",color:M.textSub,fontSize:"12px",cursor:"pointer"}}>Hoppa över denna vecka</button>
          </>
        )}
      </div>
    </div>
  );
}

// reflektioner-gränsen, för konsekvens i produkten.
function ShareAffirmationModal({affirmation,M,mode,shareCount,limit,isPremium,onClose,onShared}){
  const dateStr=new Date().toLocaleDateString("sv-SE",{day:"numeric",month:"long"});
  const remaining=Math.max(0,limit-shareCount);
  const blocked=!isPremium&&remaining<=0;
  const handleShare=async()=>{
    if(blocked)return;
    const text=`"${affirmation}"\n\n✨ Delat via Affirmi — appen för dagliga affirmationer`;
    try{
      if(navigator.share){await navigator.share({text});}
      else if(navigator.clipboard){await navigator.clipboard.writeText(text);}
    }catch(e){/* användaren avbröt delningen — inget fel att visa */}
    onShared();
  };
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>

          <p style={{fontStyle:"italic",fontSize:"19px",lineHeight:1.5,color:M.text,textAlign:"center",margin:0,position:"relative",zIndex:1}}>{affirmation}</p>
          <div style={{position:"absolute",bottom:"20px",left:0,right:0,textAlign:"center"}}>
            <div style={{fontSize:"13px",fontWeight:"800",color:M.gold,letterSpacing:"0.5px"}}>✨ Affirmi</div>
            <div style={{fontSize:"10px",color:M.textSub,marginTop:"2px"}}>Dagens affirmation · {dateStr}</div>
          </div>
        </div>
        {blocked?(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"13px",color:"#EEE",marginBottom:"10px"}}>Du har delat {limit} gånger denna vecka — gränsen för gratisanvändare.</div>

          {blocked?(
            <button onClick={()=>{onClose();}} style={{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:M.gold,color:"#1C1C1E",fontSize:"13px",fontWeight:"700",cursor:"pointer"}}>🔓✨ Lås upp Premium</button>

          )}
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#999",fontSize:"12px",cursor:"pointer"}}>Stäng</button>
      </div>
    </div>
  );
}

function GroundResaView({s,M,d,StegBar,onBack,onDone,onSkip}){
  const [step,setStep]=useState(0);
  const [done,setDone]=useState(false);
  const [showInfo,setShowInfo]=useState(false);
  const todayG=new Date().toISOString().slice(0,10);
  const groundCountToday=s.groundCountDate===todayG?(s.groundCountToday||0):0;
  const baseCap=s.isPremium?GROUND_PREMIUM_CAP:GROUND_FREE_CAP;
  const baseLimitReached=groundCountToday>=baseCap;
  const hasExtraGround=(s.extraGroundCredits||0)>0;
  const extraMaxedOut=(s.extraGroundPurchasedToday||0)>=GROUND_MAX_EXTRA;
  const groundBlocked=baseLimitReached&&!hasExtraGround&&extraMaxedOut;
  const usingExtraCredit=baseLimitReached&&hasExtraGround;
  const vib=()=>{if(navigator.vibrate) navigator.vibrate(40);};
  const finish=()=>{
    setDone(true);
    if(usingExtraCredit) d({type:"USE_EXTRA_GROUND_CREDIT"});
    d({type:"ADD_LJUS",amt:15});d({type:"COMPLETE_STEP",id:"ground"});d({type:"INC_GROUND_COUNT"});vib();
  };
  const goNext=()=>{vib();setStep(i=>i+1);};
  const goPrev=()=>{vib();setStep(i=>i-1);};

  if(groundBlocked) return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <StegBar/>
      <div style={{textAlign:"center",padding:"30px 10px"}}>
        <div style={{fontSize:"48px",marginBottom:"14px"}}>🌿</div>
        <div style={{fontSize:"17px",fontWeight:"800",marginBottom:"10px",color:M.text}}>Du har gjort dina {baseCap} {s.isPremium?"Premium-":"gratis"}övningar idag</div>
        <p style={{color:M.textSub,fontSize:"13px",lineHeight:1.7,marginBottom:"20px"}}>Du kan hoppa över det här steget och fortsätta till reflektionen 🌸</p>
        <button onClick={onSkip} style={{width:"100%",padding:"14px",background:M.button,color:M.btnText,border:"none",borderRadius:"14px",fontWeight:"700",cursor:"pointer"}}>
          Fortsätt till reflektion 📖
        </button>
      </div>
    </div>
  );

  if(done) return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <StegBar/>
      <div style={{textAlign:"center",padding:"20px 0 24px"}}>
        <div style={{fontSize:"56px",marginBottom:"14px"}}>🌿</div>
        <div style={{fontSize:"22px",fontWeight:"800",marginBottom:"8px",color:M.text}}>Du är här. Du är trygg.</div>
        <div style={{background:"rgba(28,150,74,0.1)",borderRadius:"12px",padding:"12px",marginBottom:"24px",border:"1px solid rgba(28,150,74,0.25)"}}>
          <div style={{fontSize:"14px",fontWeight:"700",color:"rgba(28,150,74,1)"}}>+15 💎 tjänade ✨</div>
        </div>
      </div>
      <button onClick={onDone} style={{width:"100%",padding:"16px",background:M.button,color:M.btnText,border:"none",borderRadius:"16px",fontSize:"16px",fontWeight:"800",cursor:"pointer"}}>
        Fortsätt till reflektion 📖
      </button>
    </div>
  );

  const g=GROUNDING[step];
  return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <button onClick={onBack} style={{padding:"6px 14px",borderRadius:"20px",border:`1.5px solid ${M.accent}70`,background:`${M.accent}20`,color:M.text,cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>← Tillbaka</button>
        <button onClick={()=>setShowInfo(v=>!v)} style={{padding:"6px 14px",borderRadius:"20px",border:`1.5px solid ${showInfo?M.gold:M.gold+"70"}`,background:showInfo?`${M.gold}25`:`${M.gold}12`,color:M.gold,fontSize:"12px",cursor:"pointer",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px",boxShadow:showInfo?"none":"0 0 0 3px rgba(200,168,75,0.08)"}}>ℹ️ Varför?</button>
      </div>
      <StegBar/>
      {showInfo&&(
        <div style={{background:M.cardMid,borderRadius:"14px",padding:"14px 16px",marginBottom:"12px",border:`1px solid ${M.accent}40`,position:"relative"}}>
          <button onClick={()=>setShowInfo(false)} style={{position:"absolute",top:"10px",right:"12px",background:"none",border:"none",color:M.textSub,cursor:"pointer",fontSize:"16px",lineHeight:1}}>✕</button>
          <div style={{fontSize:"13px",fontWeight:"700",color:M.gold,marginBottom:"6px"}}>🌿 Varför denna övning?</div>
          <p style={{color:M.textSub,fontSize:"12px",lineHeight:1.7,margin:"0 0 8px"}}>När tankar och oro tar över hjälper 5-4-3-2-1-metoden dig att snabbt landa i nuet. Genom att aktivera dina fem sinnen avbryter du negativa tankemönster och återvänder till kroppen.</p>
          <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
            {[{n:"5",sense:"Se",desc:"Synen förankrar dig i rummet du befinner dig i."},{n:"4",sense:"Känn",desc:"Beröring påminner kroppen om att den är trygg."},{n:"3",sense:"Hör",desc:"Ljud för dig tillbaka till nuet, bort från tankarna."},{n:"2",sense:"Lukta",desc:"Dofter aktiverar hjärnans lugn-center direkt."},{n:"1",sense:"Smaka",desc:"Det sista sinnet — en stilla närvaro i kroppen."}].map(item=>(
              <div key={item.sense} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
                <span style={{fontSize:"11px",color:M.gold,fontWeight:"700",minWidth:"55px",flexShrink:0}}>{item.n} × {item.sense}</span>
                <span style={{fontSize:"11px",color:M.textSub,lineHeight:1.5}}>{item.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{textAlign:"center",marginBottom:"4px"}}>
        <div style={{fontSize:"16px",fontWeight:"700",color:M.gold}}>Övning i att vara här & nu</div>
        <div style={{fontSize:"12px",color:M.textSub}}>Steg {step+1} av 5 · {Math.min(groundCountToday,baseCap+(s.extraGroundPurchasedToday||0))}/{baseCap+(s.extraGroundPurchasedToday||0)} idag</div>
      </div>
      <div style={{background:M.cardMid,borderRadius:"20px",padding:"28px 22px",textAlign:"center",margin:"16px 0"}}>
        <div style={{fontSize:"48px",marginBottom:"10px"}}>{g.emoji}</div>
        <div style={{fontSize:"40px",fontWeight:"800",color:M.gold,marginBottom:"6px"}}>{g.num}</div>
        <div style={{fontSize:"20px",fontWeight:"700",marginBottom:"10px",color:M.text}}>{g.sense}</div>
        <p style={{color:M.textSub,fontSize:"14px",lineHeight:1.6,margin:0}}>{g.text}</p>
      </div>
      <div style={{display:"flex",gap:"10px"}}>
        {step>0&&<button onClick={goPrev} style={{flex:1,padding:"13px",background:M.card,border:"none",borderRadius:"14px",color:M.text,cursor:"pointer",fontWeight:"600"}}>← Föregående</button>}
        {step<4
          ?<button onClick={goNext} style={{flex:2,padding:"13px",background:M.button,color:M.btnText,border:"none",borderRadius:"14px",fontWeight:"700",cursor:"pointer"}}>Nästa →</button>
          :<button onClick={finish} style={{flex:2,padding:"13px",background:M.button,color:M.btnText,border:"none",borderRadius:"14px",fontWeight:"700",cursor:"pointer"}}>Klar 🌿 +15 💎</button>
        }
      </div>
    </div>
  );
}

function BreathResaView({s,M,BREATH,onDone,onBack,onSkip,d,StegBar}){
  const [ph,setPh]=useState("idle");
  const [sc,setSc]=useState(0);
  const [cy,setCy]=useState(0);
  const [showInfo,setShowInfo]=useState(false);
  const bref=useRef(null);
  const breathDoneToday=(s.dailyPathDone||[]).includes("breath");
  const hasExtraBreath=(s.extraBreathCredits||0)>0;
  const breathBlocked=!s.isPremium&&breathDoneToday&&!hasExtraBreath;
  const usingExtraCredit=!s.isPremium&&breathDoneToday&&hasExtraBreath;
  const vib=()=>{if(navigator.vibrate)navigator.vibrate(60);};
  const start=()=>{
    if(usingExtraCredit) d({type:"USE_EXTRA_BREATH_CREDIT"});
    clearInterval(bref.current);
    let pi=0,sec=BREATH[0].dur,r=0;
    setPh(BREATH[0].name);setSc(sec);setCy(0);
    bref.current=setInterval(()=>{
      sec--;setSc(sec);
      if(sec<=0){
        pi=(pi+1)%4;if(pi===0)r++;
        if(r>=3){clearInterval(bref.current);setCy(3);setPh("done");vib();d({type:"ADD_LJUS",amt:10});d({type:"COMPLETE_STEP",id:"breath"});return;}
        vib();setPh(BREATH[pi].name);sec=BREATH[pi].dur;setSc(sec);setCy(r);
      }
    },1000);
  };
  const stop=()=>{clearInterval(bref.current);setPh("idle");};
  useEffect(()=>()=>clearInterval(bref.current),[]);
  const cur=BREATH.find(b=>b.name===ph);

  if(breathBlocked) return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <StegBar/>
      <div style={{textAlign:"center",padding:"30px 10px"}}>
        <div style={{fontSize:"48px",marginBottom:"14px"}}>🍃</div>
        <div style={{fontSize:"17px",fontWeight:"800",marginBottom:"10px",color:M.text}}>Du har gjort din gratis andningsövning idag</div>
        <p style={{color:M.textSub,fontSize:"13px",lineHeight:1.7,marginBottom:"20px"}}>Du kan hoppa över det här steget och fortsätta resan 🌸</p>
        <button onClick={onSkip} style={{width:"100%",padding:"14px",background:M.button,color:M.btnText,border:"none",borderRadius:"14px",fontWeight:"700",cursor:"pointer"}}>
          Fortsätt — Här & nu 🌿
        </button>
      </div>
    </div>
  );
  return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <button onClick={onBack} style={{padding:"6px 14px",borderRadius:"20px",border:`1.5px solid ${M.accent}70`,background:`${M.accent}20`,color:M.text,cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>← Tillbaka</button>
        <button onClick={()=>setShowInfo(v=>!v)} style={{padding:"6px 14px",borderRadius:"20px",border:`1.5px solid ${showInfo?M.gold:M.gold+"70"}`,background:showInfo?`${M.gold}25`:`${M.gold}12`,color:M.gold,fontSize:"12px",cursor:"pointer",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px",boxShadow:showInfo?"none":"0 0 0 3px rgba(200,168,75,0.08)"}}>ℹ️ Varför?</button>
      </div>
      <StegBar/>
      {showInfo&&(
        <div style={{background:M.cardMid,borderRadius:"14px",padding:"14px 16px",marginBottom:"12px",border:`1px solid ${M.accent}40`,position:"relative"}}>
          <button onClick={()=>setShowInfo(false)} style={{position:"absolute",top:"10px",right:"12px",background:"none",border:"none",color:M.textSub,cursor:"pointer",fontSize:"16px",lineHeight:1}}>✕</button>
          <div style={{fontSize:"13px",fontWeight:"700",color:M.gold,marginBottom:"6px"}}>🍃 Varför andningsövning?</div>
          <p style={{color:M.textSub,fontSize:"12px",lineHeight:1.7,margin:"0 0 10px"}}>Kontrollerad andning aktiverar kroppens inbyggda "lugn och ro"-läge. Bara några minuter sänker stresshormoner, lugnar hjärtat och hjälper dig hitta inre ro.</p>
          <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
            {[{phase:"Andas in 4s",desc:"Fyller lungorna och aktiverar kroppen."},{phase:"Håll 4s",desc:"Låter syret spridas och sinnet stanna."},{phase:"Andas ut 6s",desc:"Längre utandning aktiverar lugn-systemet."},{phase:"Vila 2s",desc:"Kort paus — kroppen återställer sig."}].map(item=>(
              <div key={item.phase} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
                <span style={{fontSize:"11px",color:M.gold,fontWeight:"700",minWidth:"80px",flexShrink:0}}>{item.phase}</span>
                <span style={{fontSize:"11px",color:M.textSub,lineHeight:1.5}}>{item.desc}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{textAlign:"center",marginBottom:"8px"}}>
        <div style={{fontSize:"16px",fontWeight:"700",color:M.gold}}>Andningsövning</div>
        <div style={{fontSize:"12px",color:M.textSub}}>4-4-6-2 · {cy}/3 cykler</div>
      </div>
      <div style={{display:"flex",justifyContent:"center",margin:"24px 0"}}>
        <div style={{width:"160px",height:"160px",borderRadius:"50%",background:cur?`radial-gradient(circle,${cur.color}35,${cur.color}10)`:`${M.accent}12`,border:`3px solid ${cur?cur.color:M.accent+"70"}`,boxShadow:cur?`0 0 0 3px ${cur.color}22`:`0 0 0 3px ${M.accent}18`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all 0.5s ease",transform:ph==="inhale"?"scale(1.12)":ph==="exhale"?"scale(0.90)":"scale(1)"}}>
          {ph==="idle"&&<><div style={{fontSize:"32px"}}>🍃</div><div style={{fontSize:"12px",color:M.textSub,marginTop:"8px"}}>Klar att börja</div></>}
          {ph==="done"&&<><div style={{fontSize:"32px"}}>🌸</div><div style={{fontSize:"12px",color:M.textSub,marginTop:"8px"}}>Välgjort!</div></>}
          {cur&&ph!=="done"&&<><div style={{fontSize:"34px",fontWeight:"800",color:cur.color}}>{sc}</div><div style={{fontSize:"12px",color:M.textSub,marginTop:"4px"}}>{cur.label}</div></>}
        </div>

function createNatureSound(ctx,id){
  const master=ctx.createGain();master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(0.75,ctx.currentTime+2.5);master.connect(ctx.destination);
  const nodes=[];
  const makeNoise=(dur=8)=>{const buf=ctx.createBuffer(2,ctx.sampleRate*dur,ctx.sampleRate);for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;}return buf;};
  if(id==="regn"){
    const s1=ctx.createBufferSource();s1.buffer=makeNoise(8);s1.loop=true;const f1=ctx.createBiquadFilter();f1.type="bandpass";f1.frequency.value=1000;f1.Q.value=0.5;const g1=ctx.createGain();g1.gain.value=0.5;s1.connect(f1);f1.connect(g1);g1.connect(master);s1.start();nodes.push(s1);
    const s2=ctx.createBufferSource();s2.buffer=makeNoise(8);s2.loop=true;const f2=ctx.createBiquadFilter();f2.type="lowpass";f2.frequency.value=400;const g2=ctx.createGain();g2.gain.value=0.3;s2.connect(f2);f2.connect(g2);g2.connect(master);s2.start();nodes.push(s2);
    const s3=ctx.createBufferSource();s3.buffer=makeNoise(8);s3.loop=true;const f3=ctx.createBiquadFilter();f3.type="highpass";f3.frequency.value=3000;const g3=ctx.createGain();g3.gain.value=0.15;s3.connect(f3);f3.connect(g3);g3.connect(master);s3.start();nodes.push(s3);
  }else if(id==="skog"){
    const s1=ctx.createBufferSource();s1.buffer=makeNoise(8);s1.loop=true;const f1=ctx.createBiquadFilter();f1.type="bandpass";f1.frequency.value=350;f1.Q.value=0.4;const g1=ctx.createGain();g1.gain.value=0.25;s1.connect(f1);f1.connect(g1);g1.connect(master);s1.start();nodes.push(s1);
    const s2=ctx.createBufferSource();s2.buffer=makeNoise(8);s2.loop=true;const f2=ctx.createBiquadFilter();f2.type="highpass";f2.frequency.value=2500;const g2=ctx.createGain();g2.gain.value=0.08;s2.connect(f2);f2.connect(g2);g2.connect(master);s2.start();nodes.push(s2);
    let birdTimer;
    const schedBird=()=>{if(ctx.state==="closed")return;try{const patterns=[[1800,2100,1900],[2200,1700,2000,1800],[1600,1900],[2400,2000,2200]];const pat=patterns[Math.floor(Math.random()*patterns.length)];pat.forEach((freq,i)=>{const delay=i*0.15;const o=ctx.createOscillator();const g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(freq,ctx.currentTime+delay);o.frequency.linearRampToValueAtTime(freq*1.05,ctx.currentTime+delay+0.06);o.frequency.linearRampToValueAtTime(freq*0.95,ctx.currentTime+delay+0.12);g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(0.1,ctx.currentTime+delay+0.03);g.gain.linearRampToValueAtTime(0,ctx.currentTime+delay+0.14);o.connect(g);g.connect(master);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.18);});}catch(e){}birdTimer=setTimeout(schedBird,2500+Math.random()*3000);};
    schedBird();nodes.push({stop:()=>clearTimeout(birdTimer)});
  }else if(id==="hav"){
    [0,2.5,5].forEach((offset,i)=>{const buf=ctx.createBuffer(2,ctx.sampleRate*10,ctx.sampleRate);for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let j=0;j<d.length;j++){const t=j/ctx.sampleRate;const wave=Math.pow(Math.max(0,Math.sin(t*0.35+offset)),2);d[j]=(Math.random()*2-1)*wave*0.55;}}const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=800-(i*100);const g=ctx.createGain();g.gain.value=0.35-i*0.05;src.connect(f);f.connect(g);g.connect(master);src.start(ctx.currentTime+offset);nodes.push(src);});
    const sF=ctx.createBufferSource();sF.buffer=makeNoise(8);sF.loop=true;const fF=ctx.createBiquadFilter();fF.type="highpass";fF.frequency.value=2000;const gF=ctx.createGain();gF.gain.value=0.06;sF.connect(fF);fF.connect(gF);gF.connect(master);sF.start();nodes.push(sF);
  }else if(id==="eld"){
    const s1=ctx.createBufferSource();s1.buffer=makeNoise(8);s1.loop=true;const f1=ctx.createBiquadFilter();f1.type="lowpass";f1.frequency.value=250;const g1=ctx.createGain();g1.gain.value=0.4;s1.connect(f1);f1.connect(g1);g1.connect(master);s1.start();nodes.push(s1);
    const s2=ctx.createBufferSource();s2.buffer=makeNoise(8);s2.loop=true;const f2=ctx.createBiquadFilter();f2.type="bandpass";f2.frequency.value=600;f2.Q.value=0.8;const g2=ctx.createGain();g2.gain.value=0.2;s2.connect(f2);f2.connect(g2);g2.connect(master);s2.start();nodes.push(s2);
    let crackTimer;
    const schedCrack=()=>{if(ctx.state==="closed")return;try{const o=ctx.createOscillator();const g=ctx.createGain();o.type="sawtooth";o.frequency.value=60+Math.random()*80;const dur=0.03+Math.random()*0.06;g.gain.setValueAtTime(0.12,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.connect(g);g.connect(master);o.start();o.stop(ctx.currentTime+dur);}catch(e){}crackTimer=setTimeout(schedCrack,80+Math.random()*250);};
    schedCrack();nodes.push({stop:()=>clearTimeout(crackTimer)});
  }else if(id==="vind"){
    // Tre lager vind med 8s buffertar och modulering
    [150,300,550].forEach((freq,i)=>{
      const buf=ctx.createBuffer(2,ctx.sampleRate*8,ctx.sampleRate);
      for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let j=0;j<d.length;j++){const t=j/ctx.sampleRate;const mod=0.4+0.6*Math.sin(t*(0.12+i*0.05)+i*1.2);d[j]=(Math.random()*2-1)*mod*0.35;}}
      const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
      const f=ctx.createBiquadFilter();f.type="bandpass";f.frequency.value=freq;f.Q.value=0.6;
      const g=ctx.createGain();g.gain.value=0.3-i*0.05;
      src.connect(f);f.connect(g);g.connect(master);
      src.start(ctx.currentTime+i*0.8);nodes.push(src);
    });
    // Extra lövprassel-lager med 8s buffert
    const sL=ctx.createBufferSource();sL.buffer=makeNoise(8);sL.loop=true;
    const fL=ctx.createBiquadFilter();fL.type="highpass";fL.frequency.value=3500;
    const gL=ctx.createGain();gL.gain.value=0.08;
    sL.connect(fL);fL.connect(gL);gL.connect(master);sL.start();nodes.push(sL);
    // Svepande vindgust-lager
    const sW=ctx.createBufferSource();sW.buffer=makeNoise(8);sW.loop=true;
    const fW=ctx.createBiquadFilter();fW.type="lowpass";fW.frequency.value=200;
    const gW=ctx.createGain();gW.gain.value=0.2;
    sW.connect(fW);fW.connect(gW);gW.connect(master);sW.start();nodes.push(sW);
  }
  return{master,nodes};
}

function SoundsView({s,d,M,back}){
  const [playing,setPlaying]=useState(null);
  const audioRef=useRef(null);
  const nodesRef=useRef([]);
  const masterRef=useRef(null);
  const stopAll=(withFade=false)=>{
    if(withFade&&masterRef.current&&audioRef.current){
      try{
        const master=masterRef.current;
        const ctx=audioRef.current;
        master.gain.cancelScheduledValues(ctx.currentTime);
        master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
        master.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
        setTimeout(()=>{
          nodesRef.current.forEach(n=>{try{n.stop();}catch(e){}});
          nodesRef.current=[];
          try{audioRef.current?.close();}catch(e){}
          audioRef.current=null;masterRef.current=null;
        },1600);
      }catch(e){nodesRef.current.forEach(n=>{try{n.stop();}catch(e){}});nodesRef.current=[];}
    } else {
      nodesRef.current.forEach(n=>{try{n.stop();}catch(e){}});
      nodesRef.current=[];
      if(audioRef.current){try{audioRef.current.close();}catch(e){} audioRef.current=null;}
      masterRef.current=null;
    }
  };
  const playSound=(id)=>{stopAll(false);try{const ctx=new(window.AudioContext||window.webkitAudioContext)();audioRef.current=ctx;const{nodes,master}=createNatureSound(ctx,id);nodesRef.current=nodes;masterRef.current=master;}catch(e){}};
  const toggle=(id)=>{if(playing===id){stopAll(true);setPlaying(null);}else{playSound(id);setPlaying(id);}};
  useEffect(()=>()=>stopAll(false),[]);
  return(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
        <button onClick={()=>{stopAll();setPlaying(null);back();}} style={{padding:"6px 14px",borderRadius:"20px",border:`1.5px solid ${M.accent}70`,background:`${M.accent}20`,color:M.text,cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>← Tillbaka</button>

      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {SOUNDS.map(snd=>{
          const isP=playing===snd.id;
          const expiry=(s.soundUnlocks||{})[snd.id];
          const isActive=expiry&&new Date(expiry).getTime()>Date.now();

    </>
  );
}

function ReflektionerScreen({s,d,M}){
  const [text,setText]=useState("");
  const [tab,setTab]=useState("write");
  const todayStr3=new Date().toISOString().slice(0,10);
  const harSkrivitIdag=s.journalEntries.some(e=>e.date.slice(0,10)===todayStr3);
  const hasExtraReflection=(s.extraReflectionCredits||0)>0;
  const canWrite = s.isPremium || !harSkrivitIdag || hasExtraReflection;

  const save=()=>{
    if(!text.trim())return;
    if(!canWrite){d({type:"SHOW_PREMIUM"});return;}
    if(!s.isPremium&&harSkrivitIdag&&hasExtraReflection){d({type:"USE_EXTRA_REFLECTION_CREDIT"});}
    d({type:"ADD_JOURNAL",text:text.trim()});d({type:"ADD_LJUS",amt:5});d({type:"COMPLETE_STEP",id:"journal"});setText("");
  };
  return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
        <button onClick={()=>d({type:"SET_SCREEN",screen:"hem"})} aria-label="Tillbaka till start" style={{display:"flex",alignItems:"center",justifyContent:"center",width:"32px",height:"32px",background:M.card,border:"none",borderRadius:"50%",color:M.text,fontSize:"16px",cursor:"pointer",flexShrink:0}}>←</button>
        <div>
          <div style={{fontSize:"20px",fontWeight:"800",color:M.text}}>Reflektioner</div>
          <div style={{color:M.textSub,fontSize:"13px"}}>Reflektera och väx</div>
        </div>
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"18px"}}>
        <button onClick={()=>setTab("write")} style={{flex:1,padding:"9px 8px",borderRadius:"14px",border:"none",background:tab==="write"?"#5E4B7A":M.card,color:tab==="write"?"#fff":M.text,cursor:"pointer",fontSize:"12px",fontWeight:tab==="write"?"700":"500",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>✍️ Skriv</button>
        <button onClick={()=>setTab("history")} style={{flex:1,padding:"9px 8px",borderRadius:"14px",border:"none",background:tab==="history"?"#5E4B7A":M.card,color:tab==="history"?"#fff":M.text,cursor:"pointer",fontSize:"12px",fontWeight:tab==="history"?"700":"500",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>📖 Mina</button>
        <button onClick={()=>setTab("favorites")} style={{flex:1,padding:"9px 8px",borderRadius:"14px",border:"none",background:tab==="favorites"?"#5E4B7A":M.card,color:tab==="favorites"?"#fff":M.text,cursor:"pointer",fontSize:"12px",fontWeight:tab==="favorites"?"700":"500",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>⭐ Favoriter</button>
      </div>
      {tab==="write"?(
        <>
          {!s.isPremium&&(
            <div style={{background:`${M.accent}15`,borderRadius:"14px",padding:"14px 16px",marginBottom:"14px",border:`1px solid ${M.accent}30`}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:M.gold,marginBottom:"6px"}}>📖 Din dagliga reflektion</div>
              <div style={{fontSize:"12px",color:M.textSub,lineHeight:1.7,marginBottom:canWrite?0:"10px"}}>
                {!harSkrivitIdag
                  ? "Som gratiskund får du skriva en reflektion per dag. Du har inte skrivit än idag — varsågod!"
                  : hasExtraReflection
                  ? `Du har ${s.extraReflectionCredits} extra reflektion${s.extraReflectionCredits===1?"":"er"} kvar att skriva idag 💎`
                  : "Du har redan skrivit din reflektion för idag. Vill du skriva fritt utan begränsning — uppgradera till Premium."}
              </div>
              {!canWrite&&(
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"4px"}}>
                  <button onClick={()=>d({type:"BUY_ITEM",item:"extraReflection",cost:50})} disabled={s.ljus<50} style={{flex:1,minWidth:"140px",padding:"11px",background:s.ljus<50?"rgba(122,158,177,0.1)":"rgba(122,158,177,0.18)",border:`1px solid ${M.steel}`,borderRadius:"10px",color:M.steel,fontSize:"12px",fontWeight:"700",cursor:s.ljus<50?"default":"pointer",opacity:s.ljus<50?0.5:1}}>💎 50 — skriv en till idag</button>
                  <button onClick={()=>d({type:"SHOW_PREMIUM"})} style={{flex:1,minWidth:"140px",padding:"11px",background:"rgba(200,168,75,0.15)",border:`1px solid ${M.gold}`,borderRadius:"10px",color:M.gold,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>🔓✨ Premium — skriv fritt</button>
                </div>
              )}
            </div>
          )}
          {canWrite&&(
            <>
              <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Hur mår du idag? Vad är du tacksam för?" rows={7} style={{width:"100%",padding:"16px",background:M.cardMid,border:`1px solid ${M.accent}20`,borderRadius:"14px",color:M.text,fontSize:"15px",lineHeight:1.6,resize:"none",outline:"none",boxSizing:"border-box"}}/>

              <div style={{fontSize:"18px",flexShrink:0,lineHeight:1}}>{TIME_MODE_EMOJI[tm]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"11px",color:M.textSub,marginBottom:"7px"}}>{new Date(e.date).toLocaleDateString("sv-SE",{weekday:"long",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
                <p style={{color:M.text,lineHeight:1.6,margin:0,fontSize:"14px"}}>{e.text}</p>
              </div>
              <button onClick={()=>d({type:"TOGGLE_JOURNAL_FAV",id:e.id})} aria-label="Spara som favorit" style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",flexShrink:0,opacity:e.fav?1:0.4,lineHeight:1}}>⭐</button>
            </div>

        <div>

            <div style={{textAlign:"center",color:M.textSub,padding:"48px 0"}}>Inga sparade favoriter ännu.<br/>Tryck på ⭐ vid en reflektion under "Mina" för att spara den hit! ✨</div>

                <div style={{flex:1}}>
                  <div style={{fontSize:"11px",color:M.textSub,marginBottom:"7px"}}>{new Date(e.date).toLocaleDateString("sv-SE",{weekday:"long",month:"long",day:"numeric"})}</div>
                  <p style={{color:M.text,lineHeight:1.6,margin:0,fontSize:"14px"}}>{e.text}</p>
                </div>
                <button onClick={()=>d({type:"TOGGLE_JOURNAL_FAV",id:e.id})} style={{background:"none",border:"none",color:M.textSub,cursor:"pointer",fontSize:"14px",flexShrink:0}}>✕</button>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function ShopScreen({s,d,M}){
  const today=new Date().toISOString().slice(0,10);
  const harSkrivitIdag=s.journalEntries.some(e=>e.date.slice(0,10)===today);
  const breathDoneToday=(s.dailyPathDone||[]).includes("breath");
  const extraBreathCredits=s.extraBreathCredits||0;

  const extraGroundCredits=s.extraGroundCredits||0;
  const extraGroundPurchasedToday=s.extraGroundPurchasedToday||0;
  const groundBaseCap=s.isPremium?GROUND_PREMIUM_CAP:GROUND_FREE_CAP;
  const groundCountToday=s.groundCountDate===today?(s.groundCountToday||0):0;
  const groundBaseLimitReached=groundCountToday>=groundBaseCap;
  const groundExtraMaxedOut=extraGroundPurchasedToday>=GROUND_MAX_EXTRA;
  const soundUnlocks=s.soundUnlocks||{};
  const isSoundActive=(id)=>{const exp=soundUnlocks[id];return exp&&new Date(exp).getTime()>Date.now();};

  const Item=({emoji,title,desc,cost,owned,ownedLabel,onBuy,creditLabel})=>(
    <div style={{background:M.cardMid,borderRadius:"16px",padding:"16px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"14px"}}>

      <div style={{flex:1}}>
        <div style={{fontWeight:"700",color:M.text,fontSize:"14px",marginBottom:"2px"}}>{title}</div>
        <div style={{fontSize:"12px",color:M.textSub,lineHeight:1.4}}>{desc}</div>
        {creditLabel&&<div style={{fontSize:"11px",color:M.steel,fontWeight:"700",marginTop:"4px"}}>{creditLabel}</div>}
      </div>

        <div style={{fontSize:"11px",background:"rgba(28,150,74,0.18)",color:"rgba(28,150,74,1)",padding:"7px 12px",borderRadius:"20px",fontWeight:"700",flexShrink:0}}>{ownedLabel||"✓ Klart"}</div>

      )}
    </div>
  );

  return(
    <div style={{padding:"20px",color:M.text,position:"relative",zIndex:1}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
        <button onClick={()=>d({type:"SET_SCREEN",screen:"settings"})} aria-label="Tillbaka" style={{display:"flex",alignItems:"center",justifyContent:"center",width:"32px",height:"32px",background:M.card,border:"none",borderRadius:"50%",color:M.text,fontSize:"16px",cursor:"pointer",flexShrink:0}}>←</button>
        <div style={{fontSize:"20px",fontWeight:"800",color:M.gold}}>Diamantbutik</div>
      </div>
      <div style={{color:M.textSub,fontSize:"13px",marginBottom:"6px",marginLeft:"42px"}}>Här kan du växla in dina diamanter för fler övningar</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",background:"rgba(122,158,177,0.12)",border:"1px solid rgba(122,158,177,0.3)",borderRadius:"14px",padding:"12px 16px",marginBottom:"20px"}}>
        <span style={{fontSize:"20px"}}>💎</span>
        <span style={{fontSize:"15px",fontWeight:"800",color:M.text}}>{s.ljus}</span>
        <span style={{fontSize:"12px",color:M.textSub}}>Diamanter</span>
      </div>

      {s.isPremium&&(
        <div style={{fontSize:"12px",color:M.textSub,background:`${M.accent}15`,borderRadius:"12px",padding:"12px 14px",marginBottom:"16px",lineHeight:1.5}}>⭐ Som Premium har du redan obegränsad tillgång till andning, reflektioner och allt ljud, samt {GROUND_PREMIUM_CAP} Här & nu-övningar per dag — du behöver bara köpa nedan om du vill ha fler Här & nu-övningar.</div>

      <Item emoji="🍃" title="Extra andningsövning idag" desc="Lås upp en extra andningsövning, utöver din gratisomgång." cost={50}
        owned={s.isPremium||!breathDoneToday} ownedLabel={!breathDoneToday?"Redan tillgänglig":undefined}
        creditLabel={!s.isPremium&&extraBreathCredits>0?`Du har ${extraBreathCredits} extra övning${extraBreathCredits===1?"":"ar"} kvar idag`:undefined}
        onBuy={()=>d({type:"BUY_ITEM",item:"extraBreath",cost:50})}/>
      <Item emoji="🌿" title="Extra Här & nu-övning idag" desc={`Lås upp en extra grundningsövning, utöver dina ${groundBaseCap} ${s.isPremium?"Premium-":"gratis"}övningar per dag. Max ${GROUND_MAX_EXTRA} extra per dag.`} cost={30}

        creditLabel={extraGroundCredits>0?`Du har ${extraGroundCredits} extra övning${extraGroundCredits===1?"":"ar"} kvar idag`:undefined}

      <Item emoji="📖" title="Extra reflektion idag" desc="Lås upp en extra reflektion, utöver din gratisomgång." cost={50}

      ):lockedSounds.length===0?(
        <div style={{fontSize:"12px",color:M.textSub,padding:"6px 2px"}}>Du har låst upp alla ljud just nu! 🎉</div>
      ):(
        <>
          <Item emoji="🎶" title="Alla ljud i 7 dagar" desc="Lås upp samtliga naturljud (Skogspromenad, Havsvågor, Sprakande eld, Sommarvind) i 7 dagar — istället för att köpa ett i taget." cost={400}
            owned={false}
            creditLabel="💰 Spara 33% — 400 💎 istället för 600 💎 om du köper varje spår separat"
            onBuy={()=>d({type:"BUY_ITEM",item:"soundBundle",cost:400})}/>
          {lockedSounds.map(snd=>(
            <Item key={snd.id} emoji={snd.emoji} title={snd.name} desc={`Lås upp i 7 dagar — ${snd.dur} ljudbana till Andning & Lugn & Ro.`} cost={150}
              owned={false}
              onBuy={()=>d({type:"BUY_ITEM",item:"sound",soundId:snd.id,cost:150})}/>
          ))}
        </>
      )}

      <div style={{fontSize:"11px",color:M.textSub,textAlign:"center",marginTop:"20px",lineHeight:1.6}}>Diamanter samlar du genom att slutföra övningar, skriva reflektioner och hålla ditt flöde igång. 💎</div>
    </div>
  );
}

        </div>
      )}

      {!s.isPremium&&(<button onClick={()=>d({type:"SHOW_PREMIUM"})} style={{width:"100%",padding:"13px",background:M.gold,color:"#1A1A0A",border:"none",borderRadius:"14px",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginBottom:"14px"}}>🔓✨ Lås upp Premium</button>)}
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        <button onClick={()=>d({type:"SHOW_GDPR"})} style={{width:"100%",padding:"13px",background:M.card,border:"none",borderRadius:"12px",color:M.text,textAlign:"left",cursor:"pointer",fontSize:"13px"}}>ℹ️ Om oss / Integritet</button>
        <button onClick={()=>d({type:"SHOW_KONTAKT"})} style={{width:"100%",padding:"13px",background:M.card,border:"none",borderRadius:"12px",color:M.text,textAlign:"left",cursor:"pointer",fontSize:"13px"}}>✉️ Kontakta oss</button>
      </div>
    </div>
  );
}

function App(){
  const [state,dispatch]=useReducer(reducer,undefined,loadState);
  const [mode,setMode]=useState(getTimeMode);
  useEffect(()=>{const t=setInterval(()=>setMode(getTimeMode()),60000);return()=>clearInterval(t);},[]);
  useEffect(()=>{
    if(!state.notisToast)return;
    const t=setTimeout(()=>dispatch({type:"CLEAR_NOTIS_TOAST"}),2600);
    return()=>clearTimeout(t);
  },[state.notisToast]);
  const M=MODES[mode];
  if(!state.name)return <Onboarding d={dispatch}/>;
  if(state.showWelcomeTour)return <WelcomeTour s={state} d={dispatch}/>;
  const NAV=[
    {id:"hem",label:"Hem",emoji:"🏠"},{id:"idag",label:"Idag",emoji:"✨"},
    {id:"teman",label:"Teman",emoji:"🎨"},{id:"lugn",label:"Lugn",emoji:"🌿"},
    {id:"journal",label:"Reflektioner",emoji:"📖"},
  ];
  const p={s:state,d:dispatch,M,mode};
  return(
    <div style={{minHeight:"100vh",background:M.bg,color:M.text,fontFamily:"'Segoe UI',system-ui,sans-serif",maxWidth:"480px",margin:"0 auto",position:"relative",overflow:"hidden"}}>
      <style>{`textarea::placeholder, input::placeholder{color:${M.textSub};opacity:0.85}`}</style>
      {mode==="night"&&<Stars/>}
      <Confetti active={state.confetti}/>
      {state.showPremium&&<PremiumModal m={mode} d={dispatch}/>}
      {state.showGuardianGate&&<GuardianGateModal m={mode} d={dispatch} name={state.name}/>}
      {state.showGdpr&&<GdprModal m={mode} d={dispatch}/>}
      {state.showKontakt&&<KontaktModal m={mode} d={dispatch}/>}
      {state.showNotis&&<NotisModal s={state} d={dispatch} m={mode}/>}
      {state.notisToast&&(
        <div style={{position:"fixed",bottom:"92px",left:"50%",transform:"translateX(-50%)",background:M.nav,backdropFilter:"blur(16px)",border:`1.5px solid ${M.gold}`,borderRadius:"20px",padding:"12px 20px",zIndex:700,fontSize:"13px",fontWeight:"700",color:"#F5EFDF",boxShadow:"0 6px 24px rgba(0,0,0,0.55)",animation:"notisToastPop 0.3s ease-out",whiteSpace:"nowrap",maxWidth:"92%",overflow:"hidden",textOverflow:"ellipsis"}}>
          {state.notisToast}
          <style>{`@keyframes notisToastPop{0%{transform:translateX(-50%) scale(0.7);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}`}</style>
        </div>
      )}
      <div style={{textAlign:"center",padding:"6px 0 2px",fontSize:"11px",color:M.accent,letterSpacing:"0.3px",position:"relative",zIndex:1}}>{M.label}</div>
      <div style={{paddingBottom:"72px",minHeight:"100vh",position:"relative",zIndex:1}}>
        {state.screen==="hem"&&<HemScreen {...p}/>}
        {state.screen==="idag"&&<IdagScreen {...p}/>}
        {state.screen==="teman"&&<TemanScreen {...p}/>}
        {state.screen==="lugn"&&<LugnScreen {...p}/>}
        {state.screen==="journal"&&<ReflektionerScreen {...p}/>}
        {state.screen==="settings"&&<SettingsScreen {...p}/>}
        {state.screen==="shop"&&<ShopScreen {...p}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:M.nav,backdropFilter:"blur(16px)",borderTop:`1px solid ${M.navBorder}`,display:"flex",justifyContent:"space-around",padding:"8px 0 12px",zIndex:50}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>dispatch({type:"SET_SCREEN",screen:n.id})} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",background:"none",border:"none",color:state.screen===n.id?M.gold:M.navText,cursor:"pointer",fontSize:"10px",fontWeight:state.screen===n.id?"700":"500",padding:"4px 0",transition:"color 0.2s"}}><span style={{fontSize:"20px"}}>{n.emoji}</span>{n.label}</button>))}
        <button onClick={()=>dispatch({type:"SET_SCREEN",screen:"settings"})} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",background:"none",border:"none",color:state.screen==="settings"?M.gold:M.navText,cursor:"pointer",fontSize:"10px",fontWeight:state.screen==="settings"?"700":"500",padding:"4px 0"}}><span style={{fontSize:"20px"}}>👤</span>Min sida</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
